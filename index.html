<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0b1c28" />
    <meta name="google-site-verification" content="lUCw7EOTUVsfCFkTGkMJd7lr-8qwtHiKAqIyiihT6So" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta name="description" content="Brilliant Tourism — авторские туры по Узбекистану и всему миру: подбор маршрутов, визовая поддержка, готовые и индивидуальные туры." />
    <title>Brilliant Tourism — туры по Узбекистану и всему миру</title>
  </head>
  <body>
    <!-- Sets the theme before first paint so there's no light-mode flash
         for users with a saved or system dark preference. -->
    <script>
      (function () {
        var stored = localStorage.getItem('brilliant-theme');
        var theme = stored === 'light' || stored === 'dark'
          ? stored
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
